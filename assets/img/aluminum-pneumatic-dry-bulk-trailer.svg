  </g>
  <text x="400" y="315" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800">Aluminum Pneumatic</text>
  <text x="400" y="360" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800">Dry Bulk Trailer</text>
  <text x="400" y="410" text-anchor="middle" fill="#9fb0c6" font-family="Segoe UI, Arial, sans-serif" font-size="19" letter-spacing="2">GALLEGOS TRAILER SALES</text>
